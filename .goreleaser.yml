version: 2

before:
  hooks:
    - go mod tidy

# This is a Go library — no binary artifacts are built.
# Consumers install it with: go get github.com/agentizen/agent-sdk-go@<version>
builds:
  - skip: true

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: agentizen
    name: agent-sdk-go
  draft: false
  prerelease: auto
  footer: |
    ## Install

    ```sh
    go get github.com/agentizen/agent-sdk-go@{{ .Version }}
    ```

    ## Release Information

    Version: {{ .Version }}
    Commit: {{ .Commit }}
    Date: {{ .Date }}

    For more information, visit [agentizen/agent-sdk-go](https://github.com/agentizen/agent-sdk-go)
