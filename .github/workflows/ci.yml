name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  GOFLAGS: "-buildvcs=false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.7'
        cache: true

    - name: Install tools
      run: make ci-setup

    - name: Tidy
      run: make tidy

    - name: Format
      run: make fmt

    - name: Vet
      run: make vet

    - name: Lint
      run: make lint

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Examples
      run: make examples
