name: Sync Model Registry

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # Every day at 6:00 AM UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-model-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agent-sdk-go
        uses: actions/checkout@v6
        with:
          path: agent-sdk-go

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent-sdk-go/go.mod

      - name: Sync model registry from official provider docs
        working-directory: agent-sdk-go
        run: |
          go run ./scripts/sync-model-registry/ \
            -write \
            -capabilities pkg/model/capabilities.go \
            -pricing pkg/model/pricing.go
          gofmt -w pkg/model/capabilities.go pkg/model/pricing.go

      - name: Run capability tests
        working-directory: agent-sdk-go
        run: |
          go test ./test/model/... -run TestProviderSupports -count=1

      - name: Run pricing tests
        working-directory: agent-sdk-go
        run: |
          go test ./pkg/model/... -run TestPricing -count=1

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          path: agent-sdk-go
          commit-message: "chore: sync model registry from official docs"
          branch: "chore/sync-model-registry"
          title: "chore: sync model registry from official docs"
          body: |
            Automated sync of `pkg/model/capabilities.go` and `pkg/model/pricing.go` from official provider documentation pages.

            **Capabilities** (`pkg/model/capabilities.go`):
            - OpenAI: https://developers.openai.com/api/docs/models
            - Anthropic: https://platform.claude.com/docs/en/docs/about-claude/models
            - Gemini: https://ai.google.dev/gemini-api/docs/models
            - Mistral: https://docs.mistral.ai/getting-started/models/

            **Pricing** (`pkg/model/pricing.go`):
            - Anthropic: https://www.anthropic.com/pricing
            - Gemini: https://ai.google.dev/gemini-api/docs/pricing
            - Mistral: https://mistral.ai/technology/#pricing
            - OpenAI: https://platform.openai.com/docs/pricing

            New models added with extracted prices are marked for manual review when prices could not be parsed automatically.
          labels: |
            dependencies
            automated
